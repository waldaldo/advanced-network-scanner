{% extends "base.html" %}
{% block title %}Análisis — NetScan Pro{% endblock %}
{% block page_title %}Análisis{% endblock %}

{% block content %}
<div class="row g-3 mb-4">
    <div class="col-xl-8">
        <div class="card h-100">
            <div class="card-header">
                <i class="fas fa-chart-area"></i>Actividad de Escaneos — 30 días
            </div>
            <div class="card-body p-2">
                <div id="timeline-chart" style="height:280px"></div>
            </div>
        </div>
    </div>
    <div class="col-xl-4">
        <div class="card h-100">
            <div class="card-header">
                <i class="fas fa-chart-bar"></i>Alertas por Severidad
            </div>
            <div class="card-body p-2">
                <div id="severity-chart" style="height:280px"></div>
            </div>
        </div>
    </div>
</div>

<div class="row g-3">
    <div class="col-xl-6">
        <div class="card h-100">
            <div class="card-header">
                <i class="fas fa-chart-pie"></i>Top Servicios Detectados
            </div>
            <div class="card-body p-2">
                <div id="services-chart" style="height:300px"></div>
            </div>
        </div>
    </div>
    <div class="col-xl-6">
        <div class="card h-100">
            <div class="card-header">
                <i class="fas fa-bug"></i>CVEs por Servicio
            </div>
            <div class="card-body p-0" id="cve-stats-body">
                <div class="page-loader"><div class="spinner-border spinner-border-sm"></div></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', loadAnalytics);

async function loadAnalytics() {
    const plotlyConfig = { responsive: true, displayModeBar: false };
    const darkLayout = {
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor:  'rgba(0,0,0,0)',
        font: { color: '#475569', family: 'Inter, system-ui', size: 11.5 },
        margin: { t: 10, r: 10, b: 40, l: 44 }
    };

    try {
        const [tl, sv, svc, stats] = await Promise.all([
            fetch('/api/charts/scans_timeline').then(r => r.json()),
            fetch('/api/charts/alerts_severity').then(r => r.json()),
            fetch('/api/charts/top_services').then(r => r.json()),
            fetch('/api/statistics').then(r => r.json())
        ]);

        const axisStyle = { gridcolor:'#e2e8f0', linecolor:'#e2e8f0', color:'#64748b', zerolinecolor:'#e2e8f0' };

        Plotly.newPlot('timeline-chart', tl.data,
            { ...tl.layout, ...darkLayout, xaxis: axisStyle, yaxis: axisStyle },
            plotlyConfig);

        Plotly.newPlot('severity-chart', sv.data,
            { ...sv.layout, ...darkLayout, xaxis: axisStyle, yaxis: axisStyle },
            plotlyConfig);

        Plotly.newPlot('services-chart', svc.data,
            { ...svc.layout, ...darkLayout },
            plotlyConfig);

        renderCVETable(stats.cve_stats || {});
    } catch(e) { console.error(e); }
}

function renderCVETable(cveStats) {
    const body = document.getElementById('cve-stats-body');
    const detections = cveStats.detections_by_service || [];
    if (!detections.length) {
        body.innerHTML = '<div class="page-loader" style="padding:2rem">Sin datos de detecciones CVE</div>';
        return;
    }
    const max = Math.max(...detections.map(d => d.count));
    body.innerHTML = `
        <table class="data-table">
            <thead><tr><th>Servicio</th><th>Detecciones</th><th>Frecuencia</th></tr></thead>
            <tbody>${detections.map(d => `
                <tr>
                    <td style="color:var(--text-primary)">${d.service}</td>
                    <td><span class="badge-sev sev-critical">${d.count}</span></td>
                    <td style="width:40%">
                        <div style="background:#e2e8f0; border-radius:3px; height:6px; overflow:hidden">
                            <div style="background:linear-gradient(90deg,#dc2626,#ea580c); height:100%; width:${Math.round(d.count/max*100)}%; border-radius:3px"></div>
                        </div>
                    </td>
                </tr>`).join('')}
            </tbody>
        </table>`;
}
</script>
{% endblock %}
