{% extends "base.html" %}

{% block title %}Análisis - Scanner de Red{% endblock %}

{% block content %}
<div class="pb-2 mb-3 border-bottom">
    <h1 class="h2">
        <i class="fas fa-chart-line me-2 text-info"></i>Análisis
    </h1>
</div>

<div class="row mb-4">
    <div class="col-xl-8">
        <div class="card mb-4">
            <div class="card-header"><i class="fas fa-chart-area me-1"></i>Actividad de Escaneos (30 días)</div>
            <div class="card-body"><div id="timeline-chart" style="height:300px;"></div></div>
        </div>
    </div>
    <div class="col-xl-4">
        <div class="card mb-4">
            <div class="card-header"><i class="fas fa-chart-bar me-1"></i>Alertas por Severidad</div>
            <div class="card-body"><div id="severity-chart" style="height:300px;"></div></div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-xl-6">
        <div class="card mb-4">
            <div class="card-header"><i class="fas fa-chart-pie me-1"></i>Top Servicios Detectados</div>
            <div class="card-body"><div id="services-chart" style="height:350px;"></div></div>
        </div>
    </div>
    <div class="col-xl-6">
        <div class="card mb-4">
            <div class="card-header"><i class="fas fa-bug me-1"></i>CVEs por Servicio</div>
            <div class="card-body" id="cve-stats-body">
                <div class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', loadAnalytics);

async function loadAnalytics() {
    try {
        const [timeline, severity, services, stats] = await Promise.all([
            fetch('/api/charts/scans_timeline').then(r => r.json()),
            fetch('/api/charts/alerts_severity').then(r => r.json()),
            fetch('/api/charts/top_services').then(r => r.json()),
            fetch('/api/statistics').then(r => r.json())
        ]);

        Plotly.newPlot('timeline-chart', timeline.data, timeline.layout, {responsive: true});
        Plotly.newPlot('severity-chart', severity.data, severity.layout, {responsive: true});
        Plotly.newPlot('services-chart', services.data, services.layout, {responsive: true});
        renderCveStats(stats.cve_stats || {});
    } catch(e) {
        console.error('Error loading analytics:', e);
    }
}

function renderCveStats(cveStats) {
    const detections = cveStats.detections_by_service || [];
    const body = document.getElementById('cve-stats-body');
    if (!detections.length) {
        body.innerHTML = '<p class="text-muted text-center">No hay datos de CVEs</p>';
        return;
    }
    body.innerHTML = `
        <table class="table table-dark table-sm mb-0">
            <thead><tr><th>Servicio</th><th>Detecciones</th></tr></thead>
            <tbody>
                ${detections.map(d => `
                    <tr>
                        <td>${d.service}</td>
                        <td><span class="badge bg-danger">${d.count}</span></td>
                    </tr>`).join('')}
            </tbody>
        </table>
    `;
}
</script>
{% endblock %}
