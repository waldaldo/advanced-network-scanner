<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scanner de Red - Dashboard{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    
    <!-- DataTables -->
    <link href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
        }
        
        .navbar-dark {
            background-color: #2d3436 !important;
        }
        
        .sidebar {
            background-color: #2d3436;
            min-height: calc(100vh - 56px);
        }
        
        .sidebar .nav-link {
            color: #ffffff;
            border-radius: 5px;
            margin: 2px 0;
        }
        
        .sidebar .nav-link:hover {
            background-color: #636e72;
            color: #ffffff;
        }
        
        .sidebar .nav-link.active {
            background-color: #00b894;
            color: #ffffff;
        }
        
        .card {
            background-color: #2d3436;
            border: 1px solid #636e72;
        }
        
        .card-header {
            background-color: #636e72;
            border-bottom: 1px solid #74b9ff;
        }
        
        .table-dark {
            background-color: #2d3436;
        }
        
        .btn-primary {
            background-color: #00b894;
            border-color: #00b894;
        }
        
        .btn-primary:hover {
            background-color: #00a085;
            border-color: #00a085;
        }
        
        .badge-critical {
            background-color: #d63031;
        }
        
        .badge-high {
            background-color: #e17055;
        }
        
        .badge-medium {
            background-color: #fdcb6e;
            color: #000;
        }
        
        .badge-low {
            background-color: #00b894;
        }
        
        .stat-card {
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner-border {
            color: #00b894;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-shield-alt me-2"></i>
                Scanner de Red
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="refresh-data">
                            <i class="fas fa-sync-alt me-1"></i>
                            Actualizar
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="alertsDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-bell me-1"></i>
                            Alertas
                            <span class="badge bg-danger ms-1" id="alert-count">0</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" id="alerts-dropdown">
                            <li><span class="dropdown-item-text">Cargando alertas...</span></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="/">
                                <i class="fas fa-tachometer-alt me-2"></i>
                                Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/scans">
                                <i class="fas fa-search me-2"></i>
                                Escaneos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/alerts">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                Alertas
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/analytics">
                                <i class="fas fa-chart-line me-2"></i>
                                Análisis
                            </a>
                        </li>
                    </ul>
                    
                    <hr>
                    
                    <h6 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted">
                        <span>Acciones Rápidas</span>
                    </h6>
                    
                    <ul class="nav flex-column mb-2">
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="start-scan-btn">
                                <i class="fas fa-play me-2"></i>
                                Nuevo Escaneo
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="export-data-btn">
                                <i class="fas fa-download me-2"></i>
                                Exportar Datos
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="pt-3 pb-2 mb-3">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- DataTables -->
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script>

    <!-- Global JavaScript -->
    <script>
        // Función para actualizar alertas en el dropdown
        function updateAlertsDropdown() {
            fetch('/api/alerts/recent?hours=24')
                .then(response => response.json())
                .then(data => {
                    const dropdown = document.getElementById('alerts-dropdown');
                    const alertCount = document.getElementById('alert-count');
                    
                    alertCount.textContent = data.length;
                    
                    if (data.length === 0) {
                        dropdown.innerHTML = '<li><span class="dropdown-item-text text-muted">No hay alertas recientes</span></li>';
                    } else {
                        let html = '';
                        data.slice(0, 5).forEach(alert => {
                            const severityClass = {
                                'critical': 'text-danger',
                                'high': 'text-warning',
                                'medium': 'text-info',
                                'low': 'text-success'
                            }[alert.severity] || 'text-secondary';
                            
                            html += `
                                <li>
                                    <a class="dropdown-item" href="/alerts">
                                        <div class="d-flex justify-content-between">
                                            <span class="${severityClass}">
                                                <i class="fas fa-circle me-1" style="font-size: 0.5rem;"></i>
                                                ${alert.title}
                                            </span>
                                        </div>
                                        <small class="text-muted">${alert.host}</small>
                                    </a>
                                </li>
                            `;
                        });
                        
                        if (data.length > 5) {
                            html += '<li><hr class="dropdown-divider"></li>';
                            html += '<li><a class="dropdown-item text-center" href="/alerts">Ver todas las alertas</a></li>';
                        }
                        
                        dropdown.innerHTML = html;
                    }
                })
                .catch(error => {
                    console.error('Error loading alerts:', error);
                });
        }
        
        // Función para mostrar notificaciones toast
        function showToast(message, type = 'info') {
            const toastHtml = `
                <div class="toast align-items-center text-white bg-${type} border-0" role="alert">
                    <div class="d-flex">
                        <div class="toast-body">
                            ${message}
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `;
            
            const toastContainer = document.getElementById('toast-container') || createToastContainer();
            toastContainer.insertAdjacentHTML('beforeend', toastHtml);
            
            const toastElements = toastContainer.querySelectorAll('.toast:last-child');
            const toast = new bootstrap.Toast(toastElements[0]);
            toast.show();
        }
        
        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toast-container';
            container.className = 'toast-container position-fixed top-0 end-0 p-3';
            document.body.appendChild(container);
            return container;
        }
        
        // Marcar enlace activo en sidebar
        function setActiveNavLink() {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.sidebar .nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                }
            });
        }
        
        // Inicializar cuando se carga la página
        document.addEventListener('DOMContentLoaded', function() {
            setActiveNavLink();
            updateAlertsDropdown();
            
            // Actualizar alertas cada 30 segundos
            setInterval(updateAlertsDropdown, 30000);
            
            // Event listener para actualizar datos
            document.getElementById('refresh-data').addEventListener('click', function(e) {
                e.preventDefault();
                location.reload();
            });
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
